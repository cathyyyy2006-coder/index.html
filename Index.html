<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kawaii Kiss</title>
<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeef7);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
  }.card{ text-align:center; background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.15); position:relative; }

.kawaii{ font-size:80px; cursor:pointer; transition:transform .2s; }

.kawaii:hover{ transform:scale(1.1); }

.bf{ font-size:70px; margin-left:30px; }

.row{ display:flex; align-items:center; justify-content:center; margin-top:20px; }

.kiss{ position:absolute; font-size:30px; animation:float 2s ease forwards; }

@keyframes float{ 0%{transform:translateY(0) scale(0.5);opacity:0} 50%{opacity:1} 100%{transform:translateY(-120px) scale(1.4);opacity:0} }

.hint{ margin-top:15px; color:#777; font-size:14px; } </style>

</head>
<body><div class="card">
  <h2>For My Boyfriend 💖</h2>  <div class="row">
    <div class="kawaii" id="kawaii">(≧◡≦) ♡</div>
    <div class="bf">😳</div>
  </div>  <div class="hint">Click the kawaii character for a kiss!</div>
</div><script>
const kawaii = document.getElementById('kawaii');

kawaii.addEventListener('click', () => {
  const kiss = document.createElement('div');
  kiss.className = 'kiss';
  kiss.textContent = '💋';

  const rect = kawaii.getBoundingClientRect();

  kiss.style.left = rect.left + rect.width/2 + 'px';
  kiss.style.top = rect.top + 'px';

  document.body.appendChild(kiss);

  setTimeout(()=>{
    kiss.remove();
  },2000);
});
</script></body>
</html>
